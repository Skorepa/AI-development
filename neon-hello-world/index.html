<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hello World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #050510;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
    }

    /* ── Canvases ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #matrix { z-index: 0; }
    #stars  { z-index: 1; }

    /* ── Grid overlay ── */
    .grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(0,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 6s ease-in-out infinite;
    }
    @keyframes gridPulse {
      0%,100% { opacity: .5; }
      50%      { opacity: 1;  }
    }

    /* ── Scene wrapper ── */
    .scene {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── Main heading ── */
    .title {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #fff;
      text-shadow:
        0 0  7px #fff,
        0 0 14px #fff,
        0 0 30px #0ff,
        0 0 60px #0ff,
        0 0 100px #0ff;
      animation: flicker 4s linear infinite;
    }
    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% {
        text-shadow:
          0 0  7px #fff,
          0 0 14px #fff,
          0 0 30px #0ff,
          0 0 60px #0ff,
          0 0 100px #0ff;
        opacity: 1;
      }
      20%,24%,55% {
        text-shadow: none;
        opacity: .7;
      }
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: clamp(.8rem, 2.5vw, 1.3rem);
      letter-spacing: .4em;
      color: #ff2afc;
      text-shadow:
        0 0  5px #ff2afc,
        0 0 20px #ff2afc,
        0 0 50px #ff2afc;
      animation: slideUp .8s cubic-bezier(.16,1,.3,1) both, subtitlePulse 3s ease-in-out 1s infinite;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0);    }
    }
    @keyframes subtitlePulse {
      0%,100% { opacity:1;  }
      50%      { opacity:.5; }
    }

    /* ── Neon border card ── */
    .card {
      margin-top: 1.5rem;
      padding: 1.5rem 3rem;
      border: 2px solid #0ff;
      border-radius: 4px;
      color: #0ff;
      font-size: clamp(.65rem, 1.8vw, .9rem);
      letter-spacing: .25em;
      text-transform: uppercase;
      box-shadow:
        0 0 8px  #0ff,
        0 0 20px #0ff,
        inset 0 0 8px rgba(0,255,255,.1);
      animation: cardGlow 2.5s ease-in-out infinite alternate, slideUp .8s .3s cubic-bezier(.16,1,.3,1) both;
      cursor: default;
    }
    @keyframes cardGlow {
      from { box-shadow: 0 0 8px #0ff, 0 0 20px #0ff, inset 0 0 8px rgba(0,255,255,.1); }
      to   { box-shadow: 0 0 16px #0ff, 0 0 50px #0ff, 0 0 80px #0ff, inset 0 0 20px rgba(0,255,255,.2); }
    }

    /* ── Scanline ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 10;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.15) 3px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
    }

    /* ── Orbiting rings ── */
    .rings {
      position: absolute;
      width: 420px;
      height: 420px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
    }
    .ring:nth-child(1) {
      border-top-color: #0ff;
      border-right-color: #0ff;
      box-shadow: 0 0 12px #0ff;
      animation: spin 4s linear infinite;
    }
    .ring:nth-child(2) {
      inset: 30px;
      border-bottom-color: #ff2afc;
      border-left-color: #ff2afc;
      box-shadow: inset 0 0 12px #ff2afc;
      animation: spin 6s linear infinite reverse;
    }
    .ring:nth-child(3) {
      inset: 60px;
      border-top-color: #ffe000;
      border-right-color: #ffe000;
      box-shadow: 0 0 8px #ffe000;
      animation: spin 9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <canvas id="stars"></canvas>
  <div class="grid"></div>

  <div class="scene">
    <div class="rings">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>

    <h1 class="title">Hello&nbsp;World</h1>
    <p class="subtitle">Welcome to the neon dimension</p>
    <div class="card">[ System online — all systems nominal ]</div>
  </div>

  <script>
    // ── Matrix rain ─────────────────────────────────────────────
    const mCanvas = document.getElementById('matrix');
    const mCtx    = mCanvas.getContext('2d');

    const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';
    const FONT_SIZE = 16;
    let mW, mH, cols, drops;

    function mResize() {
      mW = mCanvas.width  = window.innerWidth;
      mH = mCanvas.height = window.innerHeight;
      cols  = Math.floor(mW / FONT_SIZE);
      drops = Array(cols).fill(1);
    }

    function drawMatrix() {
      // semi-transparent fade creates the trail
      mCtx.fillStyle = 'rgba(5, 5, 16, 0.055)';
      mCtx.fillRect(0, 0, mW, mH);

      mCtx.font = FONT_SIZE + 'px monospace';

      for (let i = 0; i < cols; i++) {
        const char = CHARS[Math.floor(Math.random() * CHARS.length)];
        const y = drops[i] * FONT_SIZE;

        // head char is bright white-cyan, trail is green-cyan
        const isHead = drops[i] * FONT_SIZE < mH && Math.random() > 0.975;
        mCtx.shadowBlur  = isHead ? 12 : 4;
        mCtx.shadowColor = isHead ? '#fff' : '#0f8';
        mCtx.fillStyle   = isHead ? '#cff' : `rgba(0,${180 + Math.floor(Math.random()*75)},${100 + Math.floor(Math.random()*80)},${Math.random()*.5+.5})`;

        mCtx.fillText(char, i * FONT_SIZE, y);

        // reset column randomly after it reaches bottom
        if (y > mH && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }

    window.addEventListener('resize', mResize);
    mResize();
    setInterval(drawMatrix, 45);
  </script>

  <script>
    // ── Particle stars ──────────────────────────────────────────
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];

    const COLORS = ['#0ff','#ff2afc','#ffe000','#fff','#a78bfa'];

    class Particle {
      constructor() { this.reset(true); }
      reset(init) {
        this.x  = Math.random() * W;
        this.y  = init ? Math.random() * H : H + 5;
        this.r  = Math.random() * 1.8 + .4;
        this.vx = (Math.random() - .5) * .3;
        this.vy = -(Math.random() * .6 + .2);
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.alpha = Math.random() * .7 + .3;
        this.twinkle = Math.random() * Math.PI * 2;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.twinkle += .04;
        if (this.y < -5) this.reset(false);
      }
      draw() {
        const a = this.alpha * (.7 + .3 * Math.sin(this.twinkle));
        ctx.save();
        ctx.globalAlpha = a;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = this.color;
        ctx.fillStyle   = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    function init() {
      resize();
      particles = Array.from({ length: 180 }, () => new Particle());
    }
    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    init();
    loop();
  </script>
</body>
</html>
